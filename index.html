<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Projeto ChatBot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Projeto Chat</h1>
</header>

<main id="chat">

    <div class="mensagem bot">
        <img src="robo.jpg/robo.jpg" class="avatar">
        <span>Olá! Sou C-3PO, droid de relações cibernéticas-humanas</span>
    </div>

</main>

<div class="input-area">
    <input type="text" id="inputMensagem" placeholder="Digite sua mensagem...">
    <button onclick="enviarMensagem()">Enviar</button>
    <button onclick="toggleMicrofone()" id="btnMic">🎤</button>

</div>

<script src="script.js"></script>
</body>
</html>
